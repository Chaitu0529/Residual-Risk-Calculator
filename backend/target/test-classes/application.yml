spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6380

  mail:
    host: localhost
    port: 1025

  cache:
    type: simple

jwt:
  secret: test-secret-key-minimum-32-bytes-long-1234567890
  expiration-ms: 3600000
  refresh-expiration-ms: 86400000

ai:
  service:
    url: http://localhost:5000
    timeout: 5
